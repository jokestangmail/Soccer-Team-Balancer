<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Team Balancer</title>
<style>
:root{
  --bg:#F6F7FB;
  --card:#FFFFFF;
  --border:#E5E7EF;
  --text:#0B1220;
  --muted:#667085;
  --blue:#0A84FF;
  --shadow: 0 10px 30px rgba(10, 20, 40, 0.08);
  --r:18px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system, system-ui, Segoe UI, Roboto, Helvetica, Arial;
  background:var(--bg);
  color:var(--text);
}
.app{
  max-width:440px;
  margin:0 auto;
  padding:14px 14px 110px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}
.brand{
  display:flex; align-items:center; gap:10px;
}
.logo{
  width:34px;height:34px;border-radius:12px;
  background:linear-gradient(135deg,#0A84FF,#34C759);
  box-shadow: var(--shadow);
  position:relative;
}
.logo:after{
  content:"TB";
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:900; font-size:13px;
  letter-spacing:0.6px;
}
h1{
  margin:0;
  font-size:18px;
  font-weight:900;
  letter-spacing:0.2px;
}
.tabs{
  display:flex;
  gap:8px;
  background:rgba(255,255,255,0.7);
  border:1px solid var(--border);
  padding:6px;
  border-radius:999px;
  position:sticky;
  top:10px;
  z-index:10;
  backdrop-filter: blur(10px);
}
.tab{
  flex:1;
  padding:10px 12px;
  border-radius:999px;
  border:0;
  background:transparent;
  font-weight:900;
  color:var(--muted);
}
.tab.active{
  background:var(--card);
  color:var(--text);
  box-shadow: 0 8px 18px rgba(10, 20, 40, 0.08);
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r);
  box-shadow: 0 1px 0 rgba(10,20,40,0.03);
  padding:14px;
  margin-top:12px;
}
.row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:12px;
  border:1px solid var(--border);
  border-radius:16px;
  background:#fff;
  margin-bottom:10px;
  cursor:pointer;
}
.row.alt{background:#FBFCFF}
.row.selected{
  border-color: rgba(10,132,255,0.45);
  background:#EAF2FF;
}
.left{min-width:0; flex:1}
.name{
  font-size:16px;
  font-weight:900;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
.roleChips{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap}
.chip{
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  letter-spacing:0.15px;
  border:1px solid rgba(0,0,0,0.06);
}
.chipF{background:#FEE2E2;color:#991B1B}
.chipM{background:#DCFCE7;color:#166534}
.chipD{background:#DBEAFE;color:#1D4ED8}

.strength{
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
}
.bar{
  flex:1;
  height:10px;
  border-radius:999px;
  background:#EEF1F7;
  overflow:hidden;
}
.fill{height:100%}
.num{
  min-width:40px;
  text-align:right;
  font-size:12px;
  font-weight:900;
  color:var(--muted);
}
.badge{
  width:30px;height:30px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;
  color:var(--blue);
  background:rgba(10,132,255,0.10);
  border:1px solid rgba(10,132,255,0.18);
  flex:0 0 auto;
  margin-top:2px;
}
.badge.on{color:#fff;background:var(--blue);border-color:rgba(10,132,255,0.65)}

.controls{
  display:flex; gap:10px; flex-wrap:wrap;
}
select,input[type="text"]{
  width:100%;
  padding:12px 12px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#fff;
  font-weight:700;
  outline:none;
}
.small{font-size:12px;color:var(--muted);margin-top:8px}

.stickyBar{
  position:fixed;
  left:0; right:0; bottom:0;
  padding:12px 14px calc(12px + env(safe-area-inset-bottom));
  background:rgba(255,255,255,0.88);
  border-top:1px solid var(--border);
  backdrop-filter: blur(12px);
}
.stickyInner{
  max-width:440px;
  margin:0 auto;
  display:flex;
  gap:10px;
  align-items:center;
}
.primary{
  flex:1;
  border:0;
  background:var(--blue);
  color:#fff;
  padding:14px 14px;
  border-radius:16px;
  font-weight:900;
  font-size:15px;
}
.secondary{
  border:1px solid var(--border);
  background:#fff;
  color:var(--text);
  padding:14px 14px;
  border-radius:16px;
  font-weight:900;
  font-size:15px;
}
.secondary.smallBtn{padding:12px 12px; font-size:14px}
.btnRow{display:flex; gap:10px; margin-top:10px}
.btnRow .secondary{flex:1}
.btnRow .primary{flex:1}

.teamCard{
  border-radius:20px;
  overflow:hidden;
  border:1px solid var(--border);
  background:#fff;
  margin-top:12px;
}
.teamHeader{
  padding:12px 12px;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-weight:900;
}
.teamTitle{display:flex; align-items:center; gap:10px}
.shirt{
  width:22px;height:18px;border-radius:4px 4px 8px 8px;
  background:rgba(255,255,255,0.25);
  border:1px solid rgba(255,255,255,0.35);
}
.teamMeta{font-size:12px; opacity:0.92; text-align:right; line-height:1.2}

.c-red{background:#EB5757}
.c-white{background:#E5E7EB; color:#111}
.c-black{background:#111}
.c-blue{background:#2563EB}

.playerLine{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 12px;
  border-bottom:1px solid #F0F2F6;
  gap:12px;
}
.playerLine:last-child{border-bottom:none}
.pn{
  font-weight:900;
  min-width:0;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

/* Final teams role columns */
.roleGrid{
  display:grid;
  grid-template-columns: 42px 42px 42px;
  column-gap:14px;
  align-items:center;
  justify-content:start; /* not right-justified */
  flex:0 0 auto;
}
.roleDot{
  width:26px;height:26px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:12px;
  border:1px solid rgba(0,0,0,0.10);
}
.dotF{background:#FEE2E2;color:#991B1B}
.dotM{background:#DCFCE7;color:#166534}
.dotD{background:#DBEAFE;color:#1D4ED8}
.dotOff{visibility:hidden}

.captainTag{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;width:18px;height:18px;border-radius:999px;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:900;border:1px solid #FCD34D;vertical-align:1px}
.roleMetaRow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:8px}
.roleChecks{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.checkItem{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--border);border-radius:14px;background:#fff;font-weight:800}
.checkItem input{width:18px;height:18px;margin:0}
.captainPill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#FEF3C7;color:#92400E;border:1px solid #FCD34D;font-size:11px;font-weight:900}
.playerNameWrap{display:flex;align-items:center;gap:6px;min-width:0}
.playerCaptain{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;background:#FEF3C7;color:#92400E;font-size:12px;font-weight:900;border:1px solid #FCD34D;flex:0 0 auto}


/* Modal */
.modalBackdrop{
  position:fixed; inset:0;
  background:rgba(8,14,25,0.45);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:12px 12px calc(12px + env(safe-area-inset-bottom));
  z-index:50;
}
.modal{
  width:100%;
  max-width:440px;
  background:#fff;
  border-radius:22px;
  border:1px solid var(--border);
  box-shadow: var(--shadow);
  padding:14px;
}
.modalHeader{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  margin-bottom:10px;
}
.modalHeader h3{margin:0; font-size:16px; font-weight:900}
.modalGrid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}
label{font-size:12px; font-weight:800; color:var(--muted); display:block; margin-bottom:6px}
.field input[type="number"], .field input[type="text"]{
  width:100%;
  padding:12px 12px;
  border-radius:14px;
  border:1px solid var(--border);
  font-weight:800;
}
.roleToggle{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px}
.roleToggle button{
  border:1px solid var(--border);
  background:#fff;
  padding:10px 12px;
  border-radius:999px;
  font-weight:900;
}
.roleToggle button.onF{background:#FEE2E2;color:#991B1B;border-color:#FECACA}
.roleToggle button.onM{background:#DCFCE7;color:#166534;border-color:#BBF7D0}
.roleToggle button.onD{background:#DBEAFE;color:#1D4ED8;border-color:#BFDBFE}
.modalActions{display:flex; gap:10px; margin-top:12px}
.modalActions .primary{flex:1}
.modalActions .secondary{flex:1}
.danger{background:#fff;border:1px solid #FCA5A5;color:#991B1B}
.hidden{display:none}
.empty{
  color:var(--muted);
  font-weight:800;
  font-size:13px;
  padding:10px 6px;
}

/* Scrollable checklist (keeps Generate/Results reachable) */
#checklist{
  max-height: 52vh;
  overflow:auto;
  -webkit-overflow-scrolling: touch;
  padding-right: 2px;
}

</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.svg">
<meta name="theme-color" content="#ef4444">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Team Balancer">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1>Team Balancer</h1>
        <div class="small" id="subtitle">Build tonight’s game, then generate balanced teams.</div>
      </div>
    </div>
  </div>

  <div class="tabs" role="tablist" aria-label="Main tabs">
    <button class="tab active" id="tabGame" onclick="switchTab('game')" role="tab">Game Builder</button>
    <button class="tab" id="tabPlayers" onclick="switchTab('players')" role="tab">Players</button>
  </div>

  <!-- GAME -->
  <div id="pageGame">
    <div class="card">
      <div class="controls">
        <label for="teamCount">Number of games</label>
        <select id="teamCount" onchange="onTeamCountChange()">
          <option value="2">1 game (2 teams)</option>
          <option value="4">2 games (4 teams)</option>
        </select>
      </div>
      <div class="small"><span id="selectedCount">0</span> selected</div>
      <div class="btnRow">
        <button class="secondary" onclick="clearSelection()">Clear</button>
        <button class="secondary" onclick="regenerate()">Regenerate</button>
      </div>
    </div>

    <div id="results"></div>
    <div id="resultsEmpty" class="empty">Select players above, then tap “Generate Teams”.</div>
  <div class="card">
      <label for="gameSearch">Tonight’s players</label>
      <input id="gameSearch" type="text" placeholder="Search players…" oninput="renderChecklist()"/>
      <div id="checklist" style="margin-top:12px;"></div>
    </div>

    </div>

  <!-- PLAYERS -->
  <div id="pagePlayers" class="hidden">
    <div class="card">
      <div class="controls">
        <label for="playerSearch">Players database</label>
        <input id="playerSearch" type="text" placeholder="Search players…" oninput="renderPlayersPage()"/>
      </div>
      <div class="btnRow">
        <button class="secondary" onclick="openModal(null)">Add Player</button>
        <button class="primary" onclick="importExcel()">Import Excel</button>
      </div>
      <div id="playersList" style="margin-top:12px;"></div>
    </div>
  </div>
</div>

<!-- Sticky generate -->
<div class="stickyBar">
  <div class="stickyInner">
    <button class="primary" id="btnGenerate" onclick="generateTeams()">Generate Teams</button>
  </div>
</div>

<!-- Modal -->
<div class="modalBackdrop" id="modalBackdrop" onclick="backdropClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modalHeader">
      <h3 id="modalTitle">Player</h3>
      <button class="secondary smallBtn" onclick="closeModal()">Done</button>
    </div>

    <div class="field">
      <label>Name</label>
      <input type="text" id="fName" placeholder="Player name"/>
    </div>

    <div class="field" style="margin-top:10px;">
      <label>Position</label>
      <div class="roleChecks">
        <label class="checkItem"><input id="posF" type="checkbox"> Forward</label>
        <label class="checkItem"><input id="posM" type="checkbox"> Mid</label>
        <label class="checkItem"><input id="posD" type="checkbox"> Defense</label>
        <label class="checkItem"><input id="isCaptain" type="checkbox"> Captain</label>
      </div>
      <div class="small">Select any positions the player can play.</div>
    </div>

    <div class="card" style="margin-top:12px; box-shadow:none;">
      <div class="small" style="margin-bottom:8px; font-weight:900; color:var(--text)">Ratings</div>
      <div class="modalGrid">
        <div class="field"><label>Overall Skill (1–10)</label><input id="rOverallSkill" type="number" min="1" max="10"></div>
        <div class="field"><label>Passing (1–10)</label><input id="rPassing" type="number" min="1" max="10"></div>
        <div class="field"><label>Shooting (1–10)</label><input id="rShooting" type="number" min="1" max="10"></div>
        <div class="field"><label>Dribbling (1–10)</label><input id="rDribbling" type="number" min="1" max="10"></div>
        <div class="field"><label>Speed (1–10)</label><input id="rSpeed" type="number" min="1" max="10"></div>
        <div class="field"><label>Vision (1–10)</label><input id="rVision" type="number" min="1" max="10"></div>
        <div class="field"><label>off the ball (1–10)</label><input id="rOffTheBall" type="number" min="1" max="10"></div>
        <div class="field"><label>Defending (1–10)</label><input id="rDefending" type="number" min="1" max="10"></div>
        <div class="field"><label>WorkRate (1–10)</label><input id="rWorkRate" type="number" min="1" max="10"></div>
        <div class="field"><label>Mental (1–10)</label><input id="rMental" type="number" min="1" max="10"></div>
        <div class="field"><label>Fitness (1–10)</label><input id="rFitness" type="number" min="1" max="10"></div>
      </div>
      <div class="small">Uses your spreadsheet columns plus Position and Captain.</div>
    </div>

    <div class="modalActions">
      <button class="danger secondary" id="btnDelete" onclick="deleteCurrent()">Delete</button>
      <button class="primary" onclick="saveCurrent()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* =========================
   Storage + Data Model
   ========================= */
const LS_PLAYERS = 'tb_players_v4';
const LS_SELECTION = 'tb_selection_v4';
const RATING_FIELDS = [
  ['overallSkill','Overall Skill'],
  ['passing','Passing'],
  ['shooting','Shooting'],
  ['dribbling','Dribbling'],
  ['speed','Speed'],
  ['vision','Vision'],
  ['offTheBall','off the ball'],
  ['defending','Defending'],
  ['workRate','WorkRate'],
  ['mental','Mental'],
  ['fitness','Fitness'],
];
const EXCEL_HEADERS = ['Name','Position','Captain','Overall Skill','Passing','Shooting','Dribbling','Speed','Vision','off the ball','Defending','WorkRate','Mental','Fitness'];

let players = [];
let selection = new Set();
let currentEditId = null;
let lastSolution = null;

function $(id){ return document.getElementById(id); }
function uid(){ return Math.random().toString(36).slice(2,10); }
function clampInt(v,min,max){
  const n = Math.round(Number(v));
  if(!Number.isFinite(n)) return min;
  return Math.max(min, Math.min(max, n));
}
function displayName(p){ return (p && p.name && String(p.name).trim()) ? String(p.name).trim() : '(No name)'; }
function defaultRatings(){
  return {
    overallSkill: 5, passing: 5, shooting: 5, dribbling: 5, speed: 5,
    vision: 5, offTheBall: 5, defending: 5, workRate: 5, mental: 5, fitness: 5,
  };
}
function parseBoolish(v){
  if(v===true || v===1) return true;
  const s = String(v ?? '').trim().toLowerCase();
  return ['y','yes','true','1','captain','c','x'].includes(s);
}
function parsePositions(v){
  const s = String(v ?? '').toUpperCase().replace(/[^FMD]/g,'');
  const roles = {F:false,M:false,D:false};
  for(const ch of s){ if(ch==='F'||ch==='M'||ch==='D') roles[ch] = true; }
  if(!roles.F && !roles.M && !roles.D) roles.M = true;
  return roles;
}
function positionString(roles){
  return (roles?.F?'F':'') + (roles?.M?'M':'') + (roles?.D?'D':'');
}
function normalizePlayer(p){
  const old = p.ratings || {};
  const ratings = {
    overallSkill: clampInt(old.overallSkill ?? old.overall ?? p.overallSkill ?? 5,1,10),
    passing: clampInt(old.passing ?? p.passing ?? 5,1,10),
    shooting: clampInt(old.shooting ?? old.finishing ?? p.shooting ?? 5,1,10),
    dribbling: clampInt(old.dribbling ?? p.dribbling ?? 5,1,10),
    speed: clampInt(old.speed ?? p.speed ?? 5,1,10),
    vision: clampInt(old.vision ?? p.vision ?? 5,1,10),
    offTheBall: clampInt(old.offTheBall ?? old.off_the_ball ?? p.offTheBall ?? p['off the ball'] ?? 5,1,10),
    defending: clampInt(old.defending ?? old.defense ?? p.defending ?? 5,1,10),
    workRate: clampInt(old.workRate ?? old.stamina ?? p.workRate ?? 5,1,10),
    mental: clampInt(old.mental ?? old.clutch ?? p.mental ?? 5,1,10),
    fitness: clampInt(old.fitness ?? old.consistency ?? p.fitness ?? 5,1,10),
  };
  const roles = p.roles ? {F:!!p.roles.F,M:!!p.roles.M,D:!!p.roles.D} : parsePositions(p.position);
  return {
    id: p.id || uid(),
    name: String(p.name || '').trim(),
    roles,
    captain: !!p.captain,
    ratings,
  };
}
function load(){
  const raw = localStorage.getItem(LS_PLAYERS) || localStorage.getItem('tb_players_v1');
  if(raw){
    try{
      const arr = JSON.parse(raw);
      if(Array.isArray(arr)) players = arr.map(normalizePlayer).filter(p=>p.name);
    }catch(e){}
  }
  const selRaw = localStorage.getItem(LS_SELECTION) || localStorage.getItem('tb_selection_v1');
  if(selRaw){
    try{
      const ids = JSON.parse(selRaw);
      if(Array.isArray(ids)) selection = new Set(ids.filter(id=>players.some(p=>p.id===id)));
    }catch(e){}
  }
  save();
}
function save(){
  localStorage.setItem(LS_PLAYERS, JSON.stringify(players));
  localStorage.setItem(LS_SELECTION, JSON.stringify([...selection]));
}

/* =========================
   Scoring + Optimization
   ========================= */
function computeScore(p){
  const r = p.ratings;
  return (r.overallSkill*3.4) +
    (r.passing*1.35) +
    (r.shooting*1.25) +
    (r.dribbling*1.25) +
    (r.speed*1.0) +
    (r.vision*1.15) +
    (r.offTheBall*0.95) +
    (r.defending*1.2) +
    (r.workRate*1.0) +
    (r.mental*1.0) +
    (r.fitness*0.9);
}
function strengthPct(score){
  const min = 13.4, max = 143.5;
  return Math.max(0, Math.min(100, ((score-min)/(max-min))*100));
}
function strengthColor(pct){
  if(pct>=75) return '#34C759';
  if(pct>=55) return '#FF9F0A';
  return '#FF453A';
}
function std(arr){
  const n=arr.length; if(n<=1) return 0;
  const mean = arr.reduce((s,x)=>s+x,0)/n;
  return Math.sqrt(arr.reduce((s,x)=>s+(x-mean)*(x-mean),0)/n);
}
function roleCap(p){ const r=p.roles||{}; return {F:!!r.F, M:!!r.M, D:!!r.D}; }
function teamHasRole(team, role){ return team.some(p=>roleCap(p)[role]); }
function teamRoleCounts(team){
  let F=0,M=0,D=0;
  for(const p of team){ const c=roleCap(p); if(c.F)F++; if(c.M)M++; if(c.D)D++; }
  return {F,M,D};
}
function teamCaptainCount(team){ return team.reduce((s,p)=>s + (p.captain?1:0), 0); }
function computeObjective(teams, globalRoleCounts, teamCount){
  const totals = teams.map(t=>t.reduce((s,p)=>s+p._score,0));
  const avgs = teams.map((t,i)=>totals[i]/Math.max(1,t.length));
  const primary = std(avgs);

  const caps = teams.map(teamRoleCounts);
  const spread = (k)=>{
    const mean = caps.reduce((s,x)=>s+x[k],0)/teams.length;
    return caps.reduce((s,x)=>s+Math.abs(x[k]-mean),0)/teams.length;
  };
  const rolePenalty = spread('F') + 0.9*spread('M') + spread('D');

  let missingRoles = 0;
  if((globalRoleCounts.F||0) >= teamCount) missingRoles += caps.reduce((s,x)=>s+(x.F<=0?1:0),0);
  if((globalRoleCounts.M||0) >= teamCount) missingRoles += caps.reduce((s,x)=>s+(x.M<=0?1:0),0)*0.8;
  if((globalRoleCounts.D||0) >= teamCount) missingRoles += caps.reduce((s,x)=>s+(x.D<=0?1:0),0);

  const captainCounts = teams.map(teamCaptainCount);
  const captainSpread = std(captainCounts) * 2.1;
  let captainMissing = 0;
  if((globalRoleCounts.C||0) >= teamCount) captainMissing += captainCounts.filter(x=>x===0).length * 2.2;
  if(teamCount===2) captainMissing += captainCounts.filter(x=>x>1).length * 1.6;

  const objective = primary + (rolePenalty*0.9) + (missingRoles*2.6) + captainSpread + captainMissing;
  return {objective, primary};
}
function cloneTeams(teams){ return teams.map(t=>t.slice()); }
function teamConstraintsSatisfied(team, required){
  for(const key of required){
    if(key==='C' && teamCaptainCount(team)<1) return false;
    if(key!=='C' && !teamHasRole(team,key)) return false;
  }
  return true;
}
function enforceCoverageStrict(teams, globalCounts){
  const k = teams.length;
  const required = [];
  if((globalCounts.F||0) >= k) required.push('F');
  if((globalCounts.M||0) >= k) required.push('M');
  if((globalCounts.D||0) >= k) required.push('D');
  if((globalCounts.C||0) >= k) required.push('C');
  if(!required.length) return teams;

  for(let pass=0; pass<16; pass++){
    let changed = false;
    for(const req of required){
      for(let recv=0; recv<teams.length; recv++){
        if(teamConstraintsSatisfied(teams[recv], [req])) continue;
        let best = null;
        for(let donor=0; donor<teams.length; donor++){
          if(donor===recv) continue;
          const donorTeam = teams[donor];
          const recvTeam = teams[recv];
          if(req==='C' && teamCaptainCount(donorTeam) < 2) continue;
          if(req!=='C' && teamRoleCounts(donorTeam)[req] < 2) continue;
          for(let a=0; a<donorTeam.length; a++){
            const give = donorTeam[a];
            const qualifies = req==='C' ? !!give.captain : !!roleCap(give)[req];
            if(!qualifies) continue;
            for(let b=0; b<recvTeam.length; b++){
              const take = recvTeam[b];
              const cand = cloneTeams(teams);
              cand[donor][a] = take;
              cand[recv][b] = give;
              if(!teamConstraintsSatisfied(cand[donor], required)) continue;
              const before = computeObjective(teams, globalCounts, k).objective;
              const after = computeObjective(cand, globalCounts, k).objective;
              const delta = after - before;
              if(best===null || delta < best.delta) best = {donor,recv,a,b,delta};
            }
          }
        }
        if(best){
          const donorTeam = teams[best.donor];
          const recvTeam = teams[best.recv];
          const give = donorTeam[best.a];
          donorTeam[best.a] = recvTeam[best.b];
          recvTeam[best.b] = give;
          changed = true;
        }
      }
    }
    if(!changed) break;
  }
  return teams;
}
function greedySeed(arr, teamCount){
  const teams = Array.from({length:teamCount},()=>[]);
  const totals = Array.from({length:teamCount},()=>0);
  const captainCounts = Array.from({length:teamCount},()=>0);
  const sorted = arr.slice().sort((a,b)=>{
    const capDiff = Number(b.captain)-Number(a.captain);
    return capDiff || (b._score-a._score);
  });
  for(const p of sorted){
    let best=0, bestVal=Infinity;
    for(let i=0;i<teamCount;i++){
      const avg = totals[i]/Math.max(1,teams[i].length);
      const v = avg + (captainCounts[i]*5) + (teams[i].length*0.0001);
      if(v<bestVal){ bestVal=v; best=i; }
    }
    teams[best].push(p);
    totals[best]+=p._score;
    if(p.captain) captainCounts[best]++;
  }
  return teams;
}
function randomSeed(arr, teamCount, rand){
  const teams = Array.from({length:teamCount},()=>[]);
  const pool = arr.slice();
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(rand()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  for(let i=0;i<pool.length;i++) teams[i%teamCount].push(pool[i]);
  return teams;
}
function optimize(selected, teamCount, seed){
  let s = seed || Math.floor(Math.random()*1e9);
  const rand = ()=> (s = (s*1664525 + 1013904223) >>> 0) / 4294967296;
  const arr = selected.map(p=>({ ...p, _score: computeScore(p) }));
  const globalCounts = {
    F: arr.filter(p=>p.roles?.F).length,
    M: arr.filter(p=>p.roles?.M).length,
    D: arr.filter(p=>p.roles?.D).length,
    C: arr.filter(p=>p.captain).length,
  };
  const restarts = arr.length<=20 ? 24 : 14;
  const attempts = arr.length<=20 ? 4200 : 2800;
  let bestTeams = null, bestEval = {objective: Infinity};
  for(let r=0;r<restarts;r++){
    let cur = (r%2===0) ? greedySeed(arr, teamCount) : randomSeed(arr, teamCount, rand);
    enforceCoverageStrict(cur, globalCounts);
    let curEval = computeObjective(cur, globalCounts, teamCount);
    if(curEval.objective < bestEval.objective){ bestEval = curEval; bestTeams = cloneTeams(cur); }
    for(let t=0;t<attempts;t++){
      let a = Math.floor(rand()*teamCount), b = Math.floor(rand()*teamCount);
      if(a===b || !cur[a].length || !cur[b].length) continue;
      const ia = Math.floor(rand()*cur[a].length), ib = Math.floor(rand()*cur[b].length);
      const cand = cloneTeams(cur);
      [cand[a][ia], cand[b][ib]] = [cand[b][ib], cand[a][ia]];
      enforceCoverageStrict(cand, globalCounts);
      const ev = computeObjective(cand, globalCounts, teamCount);
      if(ev.objective <= curEval.objective){
        cur = cand; curEval = ev;
        if(ev.objective < bestEval.objective){ bestEval = ev; bestTeams = cloneTeams(cand); }
      }
    }
  }
  enforceCoverageStrict(bestTeams, globalCounts);
  const totals = bestTeams.map(t=>t.reduce((s,p)=>s+p._score,0));
  const avgs = bestTeams.map((t,i)=>totals[i]/Math.max(1,t.length));
  return {teams:bestTeams, totals, avgs, eval:bestEval, seed:s};
}

/* =========================
   Rendering
   ========================= */
function switchTab(tab){
  $('tabGame').classList.toggle('active', tab==='game');
  $('tabPlayers').classList.toggle('active', tab==='players');
  $('pageGame').classList.toggle('hidden', tab!=='game');
  $('pagePlayers').classList.toggle('hidden', tab!=='players');
  $('subtitle').textContent = tab==='game'
    ? "Build tonight’s game, then generate balanced teams."
    : "Manage your master player list (saved on your device).";
  if(tab==='players') renderPlayersPage();
  if(tab==='game') renderChecklist();
}
function updateSticky(){
  $('selectedCount').textContent = String(selection.size);
  $('btnGenerate').textContent = selection.size ? `Generate Teams (${selection.size})` : 'Generate Teams';
}
function playerMetaText(p){
  const cap = p.captain ? ' • Captain' : '';
  return `Overall ${p.ratings.overallSkill}${cap}`;
}
function appendRoleChips(el,p,full){
  if(p.roles.F){ const c=document.createElement('span'); c.className='chip chipF'; c.textContent=full?'Forward':'F'; el.appendChild(c); }
  if(p.roles.M){ const c=document.createElement('span'); c.className='chip chipM'; c.textContent=full?'Mid':'M'; el.appendChild(c); }
  if(p.roles.D){ const c=document.createElement('span'); c.className='chip chipD'; c.textContent=full?'Defense':'D'; el.appendChild(c); }
  if(p.captain){ const c=document.createElement('span'); c.className='captainPill'; c.textContent='★ Captain'; el.appendChild(c); }
}
function renderChecklist(){
  const q = ($('gameSearch').value||'').toLowerCase().trim();
  const list = players.slice().sort((a,b)=>displayName(a).localeCompare(displayName(b))).filter(p=>!q||displayName(p).toLowerCase().includes(q));
  const wrap = $('checklist'); wrap.innerHTML='';
  if(!list.length){ wrap.innerHTML = `<div class="empty">${q ? 'No match.' : 'No players yet. Import Excel or add a player.'}</div>`; return; }
  list.forEach((p, idx)=>{
    const row = document.createElement('div');
    row.className = 'row ' + (idx%2===1 ? 'alt' : '');
    if(selection.has(p.id)) row.classList.add('selected');
    row.addEventListener('click', ()=>{
      if(selection.has(p.id)) selection.delete(p.id); else selection.add(p.id);
      save(); lastSolution=null; renderResults(null); renderChecklist(); updateSticky();
    });
    const left = document.createElement('div'); left.className='left';
    const nm = document.createElement('div'); nm.className='name';
    nm.innerHTML = `${displayName(p)}${p.captain ? '<span class="captainTag">★</span>' : ''}`;
    const meta = document.createElement('div'); meta.className='meta'; meta.textContent = playerMetaText(p);
    const chips = document.createElement('div'); chips.className='roleChips'; appendRoleChips(chips,p,false);
    left.append(nm, meta, chips);
    const badge = document.createElement('div'); badge.className='badge' + (selection.has(p.id) ? ' on' : ''); badge.textContent = selection.has(p.id) ? '✓' : '+';
    row.append(left,badge); wrap.appendChild(row);
  });
}
function renderPlayersPage(){
  const q = ($('playerSearch').value||'').toLowerCase().trim();
  const list = players.slice().sort((a,b)=>displayName(a).localeCompare(displayName(b))).filter(p=>!q||displayName(p).toLowerCase().includes(q));
  const wrap = $('playersList'); wrap.innerHTML='';
  if(!list.length){ wrap.innerHTML = `<div class="empty">${q ? 'No match.' : 'No players yet. Import Excel or add one.'}</div>`; return; }
  list.forEach((p, idx)=>{
    const row = document.createElement('div'); row.className='row ' + (idx%2===1 ? 'alt' : ''); row.addEventListener('click', ()=>openModal(p));
    const left = document.createElement('div'); left.className='left';
    const nm = document.createElement('div'); nm.className='name';
    nm.innerHTML = `${displayName(p)}${p.captain ? '<span class="captainTag">★</span>' : ''}`;
    const meta = document.createElement('div'); meta.className='meta'; meta.textContent = playerMetaText(p);
    const chips = document.createElement('div'); chips.className='roleChips'; appendRoleChips(chips,p,true);
    const score = computeScore(p), pct = strengthPct(score), color = strengthColor(pct);
    const strength = document.createElement('div'); strength.className='strength'; strength.innerHTML = `<div class="bar"><div class="fill" style="width:${pct}%;background:${color}"></div></div><div class="num">${Math.round(score)}</div>`;
    left.append(nm,meta,chips,strength); row.appendChild(left); wrap.appendChild(row);
  });
}
function renderResults(sol){
  const wrap = $('results'); wrap.innerHTML=''; $('resultsEmpty').style.display = sol ? 'none' : '';
  if(!sol) return;
  const names = sol.teams.length===2 ? ['Red','White'] : ['Red','White','Black','Blue'];
  const colors = sol.teams.length===2 ? ['red','white'] : ['red','white','black','blue'];
  sol.teams.forEach((team,i)=>{
    const card = document.createElement('div'); card.className='teamCard';
    const header = document.createElement('div'); header.className='teamHeader c-'+colors[i];
    const title = document.createElement('div'); title.className='teamTitle';
    const shirt = document.createElement('div'); shirt.className='shirt';
    const tname = document.createElement('div'); tname.textContent = names[i];
    title.append(shirt,tname);
    const meta = document.createElement('div'); meta.className='teamMeta';
    const captainCount = teamCaptainCount(team);
    meta.innerHTML = `Total ${sol.totals[i].toFixed(0)}<br>Avg ${sol.avgs[i].toFixed(2)}${captainCount ? `<br>Capt ${captainCount}` : ''}`;
    header.append(title,meta); card.appendChild(header);
    const body = document.createElement('div');
    team.slice().sort((a,b)=>displayName(a).localeCompare(displayName(b))).forEach(p=>{
      const line = document.createElement('div'); line.className='playerLine';
      const nmWrap = document.createElement('div'); nmWrap.className='playerNameWrap pn';
      const nm = document.createElement('div'); nm.textContent = displayName(p);
      nmWrap.appendChild(nm);
      if(p.captain){ const cap = document.createElement('div'); cap.className='playerCaptain'; cap.textContent='★'; cap.title='Captain'; nmWrap.appendChild(cap); }
      const grid = document.createElement('div'); grid.className='roleGrid';
      [['F','dotF'],['M','dotM'],['D','dotD']].forEach(([role,klass])=>{ const x=document.createElement('div'); x.className='roleDot '+(p.roles?.[role] ? klass : 'dotOff'); x.textContent=role; grid.appendChild(x); });
      line.append(nmWrap, grid); body.appendChild(line);
    });
    card.appendChild(body); wrap.appendChild(card);
  });
}

/* =========================
   Actions
   ========================= */
function onTeamCountChange(){ lastSolution=null; renderResults(null); }
function getSelectedPlayers(){ return players.filter(p=>selection.has(p.id)); }
function generateTeams(){
  const selected = getSelectedPlayers();
  const teamCount = Number($('teamCount').value);
  if(selected.length < teamCount){ alert('Select more players first.'); return; }
  const seed = (lastSolution?.seed ?? Math.floor(Math.random()*1e9)) + 1337;
  lastSolution = optimize(selected, teamCount, seed); renderResults(lastSolution);
  $('results').scrollIntoView({behavior:'smooth', block:'start'});
}
function regenerate(){
  if(selection.size===0){ alert('Select players first.'); return; }
  lastSolution = optimize(getSelectedPlayers(), Number($('teamCount').value), Math.floor(Math.random()*1e9));
  renderResults(lastSolution); $('results').scrollIntoView({behavior:'smooth', block:'start'});
}
function clearSelection(){ selection.clear(); save(); lastSolution=null; renderResults(null); renderChecklist(); updateSticky(); }

/* =========================
   Modal CRUD
   ========================= */
function backdropClose(e){ if(e.target.id==='modalBackdrop') closeModal(); }
function setRoleChecks(roles){ $('posF').checked=!!roles.F; $('posM').checked=!!roles.M; $('posD').checked=!!roles.D; }
function readRolesFromChecks(){
  const roles = {F:$('posF').checked, M:$('posM').checked, D:$('posD').checked};
  if(!roles.F && !roles.M && !roles.D) roles.M = true;
  return roles;
}
function setRatingFields(r){
  $('rOverallSkill').value = r.overallSkill; $('rPassing').value = r.passing; $('rShooting').value = r.shooting; $('rDribbling').value = r.dribbling;
  $('rSpeed').value = r.speed; $('rVision').value = r.vision; $('rOffTheBall').value = r.offTheBall; $('rDefending').value = r.defending;
  $('rWorkRate').value = r.workRate; $('rMental').value = r.mental; $('rFitness').value = r.fitness;
}
function readRatings(){
  const r = {
    overallSkill: clampInt($('rOverallSkill').value,1,10),
    passing: clampInt($('rPassing').value,1,10),
    shooting: clampInt($('rShooting').value,1,10),
    dribbling: clampInt($('rDribbling').value,1,10),
    speed: clampInt($('rSpeed').value,1,10),
    vision: clampInt($('rVision').value,1,10),
    offTheBall: clampInt($('rOffTheBall').value,1,10),
    defending: clampInt($('rDefending').value,1,10),
    workRate: clampInt($('rWorkRate').value,1,10),
    mental: clampInt($('rMental').value,1,10),
    fitness: clampInt($('rFitness').value,1,10),
  };
  setRatingFields(r);
  return r;
}
function openModal(player){
  $('modalBackdrop').style.display='flex';
  if(player){
    currentEditId = player.id; $('modalTitle').textContent='Edit Player'; $('btnDelete').style.display='inline-flex';
    $('fName').value = player.name || ''; setRoleChecks(player.roles); $('isCaptain').checked = !!player.captain; setRatingFields(player.ratings);
  }else{
    currentEditId = null; $('modalTitle').textContent='Add Player'; $('btnDelete').style.display='none';
    $('fName').value=''; setRoleChecks({F:false,M:true,D:false}); $('isCaptain').checked = false; setRatingFields(defaultRatings());
  }
}
function closeModal(){ $('modalBackdrop').style.display='none'; }
function saveCurrent(){
  const name = ($('fName').value||'').trim(); if(!name){ alert('Name is required.'); return; }
  const data = { name, roles: readRolesFromChecks(), captain: $('isCaptain').checked, ratings: readRatings() };
  if(currentEditId){ const i = players.findIndex(p=>p.id===currentEditId); if(i>=0) players[i] = {...players[i], ...data}; }
  else players.push({ id: uid(), ...data });
  save(); renderPlayersPage(); renderChecklist(); updateSticky(); closeModal();
}
function deleteCurrent(){
  if(!currentEditId || !confirm('Delete this player?')) return;
  players = players.filter(p=>p.id!==currentEditId); selection.delete(currentEditId);
  save(); lastSolution=null; renderResults(null); renderPlayersPage(); renderChecklist(); updateSticky(); closeModal();
}

/* =========================
   Import Excel
   ========================= */
function importExcel(){
  if(typeof XLSX === 'undefined'){ alert('Excel import library did not load. Check your internet connection and try again.'); return; }
  const input = document.createElement('input');
  input.type='file'; input.accept='.xlsx,.xls';
  input.onchange = (e)=>{
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt)=>{
      try{
        const wb = XLSX.read(evt.target.result, {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
        const imported = rows.map(row=>({
          id: uid(),
          name: String(row['Name'] ?? '').trim(),
          roles: parsePositions(row['Position']),
          captain: parseBoolish(row['Captain']),
          ratings: {
            overallSkill: clampInt(row['Overall Skill'] ?? 5,1,10),
            passing: clampInt(row['Passing'] ?? 5,1,10),
            shooting: clampInt(row['Shooting'] ?? 5,1,10),
            dribbling: clampInt(row['Dribbling'] ?? 5,1,10),
            speed: clampInt(row['Speed'] ?? 5,1,10),
            vision: clampInt(row['Vision'] ?? 5,1,10),
            offTheBall: clampInt(row['off the ball'] ?? 5,1,10),
            defending: clampInt(row['Defending'] ?? 5,1,10),
            workRate: clampInt(row['WorkRate'] ?? 5,1,10),
            mental: clampInt(row['Mental'] ?? 5,1,10),
            fitness: clampInt(row['Fitness'] ?? 5,1,10),
          }
        })).filter(p=>p.name);
        if(!imported.length){ alert('No valid players were found. Expected columns: ' + EXCEL_HEADERS.join(', ')); return; }
        players = imported; selection = new Set(); save(); lastSolution = null; renderResults(null); renderPlayersPage(); renderChecklist(); updateSticky();
        alert(`Imported ${imported.length} players.`);
      }catch(err){ alert('Import failed: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  };
  input.click();
}

load();
switchTab('game'); // default to Game Builder
renderChecklist();
renderPlayersPage();
updateSticky();
